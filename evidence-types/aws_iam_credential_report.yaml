apiVersion: concord.dev/v1
kind: EvidenceType
metadata:
  id: aws/iam_credential_report
  version: v1.0.0
spec:
  source: aws
  description: |
    IAM credential report rows, from the aws plugin collectIAMCredentialReport
    (GenerateCredentialReport + GetCredentialReport):
    { fetched_at, generated_at, users: [ { user, arn, mfa_active,
    password_enabled, access_key_*_active, ... } ] }.
  compatibility: backward
  schema:
    $schema: "https://json-schema.org/draft/2020-12/schema"
    type: object
    required: [users]
    properties:
      fetched_at: {type: string}
      generated_at: {type: string}
      users:
        type: array
        items: {type: object}
    additionalProperties: true
