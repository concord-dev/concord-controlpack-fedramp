apiVersion: concord.dev/v1
kind: EvidenceType
metadata:
  id: aws/config_conformance_status
  version: v1.0.0
spec:
  source: aws
  description: |
    AWS Config conformance-pack compliance, with recorder coverage. From the aws
    plugin collectConfigConformanceStatus (DescribeConformancePacks +
    GetConformancePackComplianceSummary + recorder status): { fetched_at,
    active_regions:[region], recorders:[{name, region, recording, all_supported}],
    conformance_packs:[{name, compliance_state, region}] }.
  compatibility: backward
  schema:
    $schema: "https://json-schema.org/draft/2020-12/schema"
    type: object
    required: [conformance_packs]
    properties:
      fetched_at: {type: string}
      active_regions: {type: array, items: {type: string}}
      recorders: {type: array, items: {type: object}}
      conformance_packs:
        type: array
        items:
          type: object
          required: [name, compliance_state]
          properties:
            name: {type: string}
            compliance_state: {type: string}
            region: {type: string}
          additionalProperties: true
    additionalProperties: true
