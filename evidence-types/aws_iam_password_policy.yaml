apiVersion: concord.dev/v1
kind: EvidenceType
metadata:
  id: aws/iam_password_policy
  version: v1.0.0
spec:
  source: aws
  description: |
    IAM account password policy, from the aws plugin collectIAMPasswordPolicy
    (GetAccountPasswordPolicy). Two shapes: when a policy exists,
    { fetched_at, policy: { configured, minimum_password_length, ... } }; when
    none is set, { fetched_at, configured: false }. Hence policy is optional.
  compatibility: backward
  schema:
    $schema: "https://json-schema.org/draft/2020-12/schema"
    type: object
    properties:
      fetched_at: {type: string}
      configured: {type: boolean}
      policy: {type: object}
    additionalProperties: true
