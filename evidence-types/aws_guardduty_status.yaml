apiVersion: concord.dev/v1
kind: EvidenceType
metadata:
  id: aws/guardduty_status
  version: v1.0.0
spec:
  source: aws
  description: |
    GuardDuty detector status. From the aws plugin collectGuardDutyStatus
    (ListDetectors + GetDetector):
      { fetched_at, active_regions:[region],
        guardduty_detectors:[{id, region, status}] }.
    Controls require an ENABLED detector in every active region. Single-region.
  compatibility: backward
  schema:
    $schema: "https://json-schema.org/draft/2020-12/schema"
    type: object
    required: [active_regions, guardduty_detectors]
    properties:
      fetched_at: {type: string}
      active_regions:
        type: array
        items: {type: string}
      guardduty_detectors:
        type: array
        items:
          type: object
          required: [region, status]
          properties:
            id: {type: string}
            region: {type: string}
            status: {type: string}
          additionalProperties: true
    additionalProperties: true
